<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kommodo Video Downloader</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./static/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./static/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./static/images/apple-touch-icon.png">
    <link
      rel="stylesheet"
      href="./static/style.css"
    />
  </head>
  <body>
    <header class="app-header">
      <nav class="app-nav">
        <ul class="nav-list">
          <li>
            <a href="./index.html" class="nav-link nav-link-active">Home</a>
          </li>
          <li>
            <a href="./about.html" class="nav-link">About Developer</a>
          </li>
        </ul>
      </nav>
    </header>

    <div class="container">
      <div class="header">
        <div class="logo-container">
          <img
            src="./static/images/kommodo_logo.png"
            alt="kommodo logo"
          />
        </div>
        <h1>Kommodo Video Downloader</h1>
        <p>
          Paste the video URL below to initiate the secure download process.
        </p>
      </div>

      <div class="input-card">
        <form
          id="videoCaptureForm"
          method="POST"
          class="input-group"
        >
          <input
            type="url"
            name="url"
            class="url-input"
            placeholder="e.g., https://kommodo.ai/recordings/your-video-id"
            id="videoUrlInput"
            required
          />
          <button type="submit" id="captureButton" class="download-button">
            <span>Download Video</span>
          </button>
        </form>
      </div>

      <div id="loaderContainer" class="loader-container">
        <div class="dot-loader">
          <svg viewBox="0 0 80 20">
            <circle class="dot" cx="10" cy="10" r="5"></circle>
            <circle class="dot" cx="40" cy="10" r="5"></circle>
            <circle class="dot" cx="70" cy="10" r="5"></circle>
          </svg>
        </div>
        <div class="loader-text">Processing your video link...</div>
      </div>

      <section id="downloadResults" class="results-section">
        <div class="results-header">
            <div class="success-badge">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                </svg>
                Ready to download
            </div>
        </div>
        <div class="main-layout">
          <!-- Top: Large Video Focus -->
          <div class="thumbnail-container">
          </div>

          <!-- Bottom: Action Area -->
          <div class="action-area">
              <button class="download-button">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                      <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                  </svg>
                  Download Now
              </button>
          </div>
        </div>
      </section>
      <section class="error-section">
        <div class="error-message" id="errorMessage">
          <!-- Error messages will be displayed here -->
        </div>
      </section>
    </div>

    <script src="./static/script.js"></script>
  </body>
</html>
